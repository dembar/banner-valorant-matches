<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Valorant Scoreboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: transparent;
    overflow: hidden;
    font-family: 'Arial Black', Arial, sans-serif;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    padding: 12px;
  }

  .scoreboard {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px 10px 18px;
    background: rgba(8, 8, 14, 0.85);
    border: 1px solid rgba(255, 70, 85, 0.5);
    border-radius: 12px;
    backdrop-filter: blur(10px);
    box-shadow: 0 6px 28px rgba(0,0,0,0.55);
    transition: opacity 0.4s ease, filter 0.4s ease;
    white-space: nowrap;
  }

  .scoreboard.is-disconnected {
    opacity: 0.45;
    filter: grayscale(0.4);
  }

  .team-block {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .team-row {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .team-logo {
    width: 28px;
    height: 28px;
    object-fit: contain;
    border-radius: 4px;
    display: none;
    flex-shrink: 0;
  }

  .team-tag {
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 0.1em;
    color: #c9ced6;
    text-transform: uppercase;
    min-width: 34px;
    text-align: center;
  }

  .team-score {
    font-size: 30px;
    font-weight: 900;
    color: #ffffff;
    min-width: 22px;
    text-align: center;
    line-height: 1;
    text-shadow: 0 0 14px rgba(255,255,255,0.2);
  }

  .diamonds {
    display: flex;
    gap: 4px;
    justify-content: center;
    min-height: 10px;
  }

  .diamond {
    width: 9px;
    height: 9px;
    transform: rotate(45deg);
    border: 1.5px solid rgba(255,255,255,0.35);
    background: transparent;
    flex-shrink: 0;
    transition: background 0.3s ease, border-color 0.3s ease;
  }

  .diamond.filled {
    background: #ffffff;
    border-color: #ffffff;
    box-shadow: 0 0 6px rgba(255,255,255,0.7);
  }

  .divider {
    font-size: 24px;
    font-weight: 900;
    color: rgba(255, 70, 85, 0.85);
    padding: 0 2px;
    align-self: flex-start;
    margin-top: 4px;
  }

  .pipe {
    font-size: 18px;
    color: rgba(255,255,255,0.15);
    padding: 0 2px;
  }

  .map-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
  }

  .map-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: rgba(255,70,85,0.7);
    text-transform: uppercase;
  }

  .map-name {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #8891a4;
    text-transform: uppercase;
  }

  .status-block {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-left: 2px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-dot.green {
    background: #27d17f;
    box-shadow: 0 0 8px rgba(39,209,127,0.9);
    animation: pulse 2s ease-in-out infinite;
  }

  .status-dot.red {
    background: #ff4d57;
    box-shadow: 0 0 8px rgba(255,77,87,0.9);
  }

  .status-label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.12em;
    color: #8891a4;
    text-transform: uppercase;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.45; }
  }
</style>
</head>
<body>

<div class="scoreboard" id="scoreboard">

  <!-- Team A (izquierda) -->
  <div class="team-block">
    <div class="team-row">
      <img id="logo-a" class="team-logo" alt="Team A" />
      <span id="name-a" class="team-tag">XLG</span>
      <span id="score-a" class="team-score">0</span>
    </div>
    <div class="diamonds" id="diamonds-a"></div>
  </div>

  <span class="divider">:</span>

  <!-- Team B (derecha) -->
  <div class="team-block">
    <div class="team-row">
      <span id="score-b" class="team-score">0</span>
      <span id="name-b" class="team-tag">EDG</span>
      <img id="logo-b" class="team-logo" alt="Team B" />
    </div>
    <div class="diamonds" id="diamonds-b"></div>
  </div>

  <span class="pipe">|</span>

  <!-- Mapa -->
  <div class="map-block">
    <span class="map-label" id="map-label">MAP 1</span>
    <span class="map-name" id="map-name">LIVE</span>
  </div>

  <!-- Status -->
  <div class="status-block">
    <span id="status-dot" class="status-dot green"></span>
    <span id="status-label" class="status-label">LIVE</span>
  </div>

</div>

<script>
const API_URL       = 'http://localhost:3030/score';
const POLL_INTERVAL = 10000;

const el = {
  board:     document.getElementById('scoreboard'),
  logoA:     document.getElementById('logo-a'),
  nameA:     document.getElementById('name-a'),
  scoreA:    document.getElementById('score-a'),
  diamondsA: document.getElementById('diamonds-a'),
  scoreB:    document.getElementById('score-b'),
  nameB:     document.getElementById('name-b'),
  logoB:     document.getElementById('logo-b'),
  diamondsB: document.getElementById('diamonds-b'),
  mapLabel:  document.getElementById('map-label'),
  mapName:   document.getElementById('map-name'),
  dot:       document.getElementById('status-dot'),
  label:     document.getElementById('status-label'),
};

let consecutiveFails = 0;
let lastData = null;
let timer = null;

function renderDiamonds(container, won, format) {
  const total = format === 'bo5' ? 3 : 2;
  container.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const d = document.createElement('span');
    d.className = 'diamond' + (i < won ? ' filled' : '');
    container.appendChild(d);
  }
}

function applyLogo(imgEl, url) {
  if (url && url.trim()) {
    // Usar el proxy local para evitar CORS con owcdn.net
    const proxied = 'http://localhost:3030/img?url=' + encodeURIComponent(url);
    imgEl.src = proxied;
    imgEl.style.display = 'block';
    imgEl.onerror = () => { imgEl.style.display = 'none'; };
  } else {
    imgEl.style.display = 'none';
  }
}

function render(data) {
  el.nameA.textContent = data.teamA.name || '???';
  el.scoreA.textContent = String(data.teamA.score ?? 0);
  el.scoreB.textContent = String(data.teamB.score ?? 0);
  el.nameB.textContent = data.teamB.name || '???';
  el.mapName.textContent = data.map || 'LIVE';
  if (el.mapLabel) el.mapLabel.textContent = 'MAP ' + (data.mapNumber || 1);

  const fmt = data.seriesFormat || 'bo3';
  renderDiamonds(el.diamondsA, data.teamA.mapsWon ?? 0, fmt);
  renderDiamonds(el.diamondsB, data.teamB.mapsWon ?? 0, fmt);

  applyLogo(el.logoA, data.teamA.logo);
  applyLogo(el.logoB, data.teamB.logo);
}

function setConnected(ok) {
  if (ok) {
    el.board.classList.remove('is-disconnected');
    el.dot.className = 'status-dot green';
    el.label.textContent = 'LIVE';
  } else {
    el.board.classList.add('is-disconnected');
    el.dot.className = 'status-dot red';
    el.label.textContent = 'OFFLINE';
  }
}

async function fetchScore() {
  try {
    const res = await fetch(API_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    lastData = data;
    consecutiveFails = 0;
    render(data);
    setConnected(true);
  } catch (err) {
    consecutiveFails++;
    if (lastData) render(lastData);
    if (consecutiveFails >= 3) setConnected(false);
  }
}

function startPolling() {
  if (timer) return;
  fetchScore();
  timer = setInterval(fetchScore, POLL_INTERVAL);
}

function stopPolling() {
  clearInterval(timer);
  timer = null;
}

window.__scoreboard = { startPolling, stopPolling, refresh: fetchScore };
startPolling();
</script>
</body>
</html>
